<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="TürkiyeAI hero banner">
  <defs>
    <!-- Hero background gradient: Turkish Red → Aegean Blue → Bosphorus Night -->
    <linearGradient id="hero-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#C8102E"/>
      <stop offset="45%"  stop-color="#8B2040"/>
      <stop offset="75%"  stop-color="#1C3A5E"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>

    <!-- Crescent gradient to match background -->
    <radialGradient id="cresc-grad" cx="55%" cy="40%" r="55%" gradientUnits="userSpaceOnUse"
                    x1="700" y1="0" x2="1200" y2="360">
      <stop offset="0%"   stop-color="#1C3A5E"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </radialGradient>

    <!-- Turkish geometric tile pattern (İznik / Ottoman mosaic motif) -->
    <pattern id="tile-pattern" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <!-- Diamond outer frame -->
      <path d="M30,2 L58,30 L30,58 L2,30 Z"
            fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.8"/>
      <!-- Inner diamond -->
      <path d="M30,12 L48,30 L30,48 L12,30 Z"
            fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.7"/>
      <!-- Connecting cross lines -->
      <line x1="30" y1="2"  x2="30" y2="12" stroke="rgba(255,255,255,0.05)" stroke-width="0.6"/>
      <line x1="58" y1="30" x2="48" y2="30" stroke="rgba(255,255,255,0.05)" stroke-width="0.6"/>
      <line x1="30" y1="58" x2="30" y2="48" stroke="rgba(255,255,255,0.05)" stroke-width="0.6"/>
      <line x1="2"  y1="30" x2="12" y2="30" stroke="rgba(255,255,255,0.05)" stroke-width="0.6"/>
      <!-- Centre rosette dot -->
      <circle cx="30" cy="30" r="1.8" fill="rgba(255,255,255,0.06)"/>
      <!-- Corner connecting lines (inter-tile links) -->
      <line x1="0"  y1="0"  x2="2"  y2="2"  stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
      <line x1="60" y1="0"  x2="58" y2="2"  stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
      <line x1="60" y1="60" x2="58" y2="58" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
      <line x1="0"  y1="60" x2="2"  y2="58" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
    </pattern>

    <!-- Terracotta accent band gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#D4A843" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#D4A843" stop-opacity="0.6"/>
      <stop offset="70%"  stop-color="#C0523B" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C0523B" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── Layer 1: Gradient background ─────────────────── -->
  <rect width="1200" height="360" fill="url(#hero-grad)"/>

  <!-- ── Layer 2: Geometric tile overlay ──────────────── -->
  <rect width="1200" height="360" fill="url(#tile-pattern)"/>

  <!-- ── Layer 3: Horizontal Ottoman gold accent band ─── -->
  <rect x="0" y="166" width="1200" height="2" fill="url(#accent-grad)" opacity="0.4"/>

  <!-- ── Layer 4: Large decorative crescent (right side) -->
  <!-- Large white circle -->
  <circle cx="980" cy="180" r="220" fill="rgba(255,255,255,0.06)"/>
  <!-- Cut circle to create crescent effect, opens left -->
  <circle cx="1040" cy="155" r="195" fill="rgba(0,10,30,0.30)"/>

  <!-- ── Layer 5: Large decorative star ───────────────── -->
  <!-- Star centred at (870,170), outer=55, inner=22 -->
  <polygon
    points="870,115 882.9,152.2 922.3,153.0 890.9,176.8 902.3,214.5 870,192.0 837.7,214.5 849.1,176.8 817.7,153.0 857.1,152.2"
    fill="rgba(255,255,255,0.07)"/>

  <!-- ── Layer 6: Subtle bottom fade ───────────────────── -->
  <rect x="0" y="280" width="1200" height="80"
        fill="url(#hero-grad)" opacity="0.4"/>

  <!-- ── Layer 7: Bottom decorative border (mosaic stripe) -->
  <rect x="0" y="350" width="1200" height="4" fill="rgba(212,168,67,0.35)"/>
  <rect x="0" y="354" width="1200" height="2" fill="rgba(192,82,59,0.25)"/>
  <rect x="0" y="356" width="1200" height="4" fill="rgba(30,154,189,0.20)"/>
</svg>
