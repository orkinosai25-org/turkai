<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72" role="img" aria-label="TürkiyeAI">
  <defs>
    <radialGradient id="logo-bg" cx="20" cy="18" r="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E0244A"/>
      <stop offset="100%" stop-color="#8B0015"/>
    </radialGradient>
    <filter id="logo-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- ── Icon badge (56×56, centred in 72px height row) ── -->
  <g transform="translate(8, 8)">
    <!-- Badge circle -->
    <circle cx="28" cy="28" r="27" fill="url(#logo-bg)" filter="url(#logo-shadow)"/>
    <!-- Inner decorative ring -->
    <circle cx="28" cy="28" r="25" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.9"/>
    <!-- Crescent: large white circle -->
    <circle cx="22" cy="28" r="12.5" fill="white"/>
    <!-- Crescent: red cutout -->
    <circle cx="27" cy="25.5" r="10.5" fill="url(#logo-bg)"/>
    <!-- Star: centre (41,25), outer=6, inner=2.4 -->
    <polygon
      points="41,19 42.4,23.1 46.7,23.1 43.3,25.7 44.5,29.9 41,27.4 37.5,29.9 38.7,25.7 35.3,23.1 39.6,23.1"
      fill="white"/>
    <!-- Dashed inner ring -->
    <circle cx="28" cy="28" r="26.5" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="0.9" stroke-dasharray="2.5 2"/>
  </g>

  <!-- ── Wordmark ─────────────────────────────────────── -->
  <!-- "Türkiye" in Turkish Red -->
  <text
    x="80" y="44"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="30"
    font-weight="800"
    letter-spacing="-0.5"
    fill="#C8102E">Türkiye</text>

  <!-- "AI" in Aegean Blue -->
  <text
    x="233" y="44"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="30"
    font-weight="800"
    letter-spacing="-0.5"
    fill="#1A6B9A">AI</text>

  <!-- Tagline -->
  <text
    x="80" y="60"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="10.5"
    font-weight="400"
    letter-spacing="0.6"
    fill="#8D7B6B">YOUR AI TÜRKİYE TRAVEL EXPERT</text>
</svg>
